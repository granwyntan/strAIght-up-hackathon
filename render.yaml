services:
  - type: web
    name: gramwin-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: BACKEND_PUBLIC_BASE_URL
        value: https://REPLACE_ME.onrender.com
